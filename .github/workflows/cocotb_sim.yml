name: CocoTB Simulation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  cocotb_sim:
    runs-on: ubuntu-latest
    container:
      image: python:3.13-bookworm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Install GHDL
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ghdl make
          rm -rf /var/lib/apt/lists/*

      - name: Install Python packages
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install cocotb cocotbext-axi scapy pytest

      - name: Verify toolchain
        run: |
          python3 --version
          ghdl --version
          python3 -c "import cocotb, cocotbext.axi, scapy; print('Python packages OK')"

      - name: Run CocoTB simulation
        run: make sim_rmii_axis_decoder_cocotb

      - name: Publish CocoTB Test Report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: RMII AXIS Decoder CocoTB Results
          path: results.xml
          reporter: java-junit
